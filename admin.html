<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Romero - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h1>📦 Stock Romero</h1>
  <div class="navbar-right">
    <span id="user-name"></span>
    <span style="opacity:0.6;font-size:0.75rem">ADMIN</span>
    <button class="btn-logout" id="btn-logout">Salir</button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="stock">Stock actual</button>
  <button class="tab-btn" data-tab="movimiento">Registrar movimiento</button>
  <button class="tab-btn" data-tab="historial">Historial</button>
  <button class="tab-btn" data-tab="usuarios">Usuarios</button>
</div>

<div class="content">

  <!-- STOCK ACTUAL -->
  <div class="tab-panel active" id="tab-stock">
    <div class="card">
      <h2>Stock actual</h2>
      <div id="stock-loading" class="loading">Cargando productos...</div>
      <table id="stock-table" class="hidden">
        <thead>
          <tr>
            <th>Código</th>
            <th>Producto</th>
            <th>Unidad</th>
            <th>Stock</th>
            <th>Última actualización</th>
            <th>Ajuste manual</th>
          </tr>
        </thead>
        <tbody id="stock-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- REGISTRAR MOVIMIENTO -->
  <div class="tab-panel" id="tab-movimiento">
    <div class="card">
      <h2>Registrar movimiento</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Producto</label>
          <select id="mov-producto">
            <option value="">Seleccioná un producto...</option>
          </select>
        </div>
        <div class="form-group" style="max-width:160px">
          <label>Tipo</label>
          <select id="mov-tipo">
            <option value="entrada">↑ Entrada</option>
            <option value="salida">↓ Salida</option>
          </select>
        </div>
        <div class="form-group" style="max-width:130px">
          <label>Cantidad</label>
          <input type="number" id="mov-cantidad" min="1" placeholder="0" />
        </div>
        <div class="form-group" style="justify-content:flex-end;flex:0">
          <button class="btn btn-primary" id="btn-registrar">Registrar</button>
        </div>
      </div>
      <div id="mov-error" class="error-msg hidden"></div>
      <div id="mov-info" class="info-msg hidden"></div>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="tab-panel" id="tab-historial">
    <div class="card">
      <h2>Historial de movimientos</h2>
      <div class="form-row" style="margin-bottom:16px">
        <div class="form-group">
          <label>Filtrar por producto</label>
          <select id="hist-filtro-producto"><option value="">Todos</option></select>
        </div>
        <div class="form-group" style="max-width:160px">
          <label>Tipo</label>
          <select id="hist-filtro-tipo">
            <option value="">Todos</option>
            <option value="entrada">Entrada</option>
            <option value="salida">Salida</option>
            <option value="ajuste">Ajuste</option>
          </select>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Fecha/Hora</th>
            <th>Producto</th>
            <th>Tipo</th>
            <th>Cantidad</th>
            <th>Usuario</th>
          </tr>
        </thead>
        <tbody id="hist-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- USUARIOS -->
  <div class="tab-panel" id="tab-usuarios">
    <div class="card">
      <h2>Crear usuario</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="usr-nombre" placeholder="Nombre completo" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="usr-email" placeholder="email@romero.com" />
        </div>
        <div class="form-group" style="max-width:160px">
          <label>Contraseña</label>
          <input type="password" id="usr-password" placeholder="••••••" />
        </div>
        <div class="form-group" style="max-width:140px">
          <label>Rol</label>
          <select id="usr-rol">
            <option value="operador">Operador</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group" style="flex:0;justify-content:flex-end">
          <button class="btn btn-primary" id="btn-crear-usuario">Crear</button>
        </div>
      </div>
      <div id="usr-error" class="error-msg hidden" style="margin-top:12px"></div>
    </div>
    <div class="card">
      <h2>Usuarios</h2>
      <table>
        <thead>
          <tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Acción</th></tr>
        </thead>
        <tbody id="usr-tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
// ============================================================
// ⚠️ AJUSTAR: nombre de colección y campos en romero-env
const COLECCION_PRODUCTOS = 'productos';
const CAMPO_NOMBRE  = 'nombre';
const CAMPO_CODIGO  = 'codigo';
const CAMPO_UNIDAD  = 'unidad';
// ============================================================

const firebaseConfigEnvase = {
  apiKey: "AIzaSyAJgnFCKt_8TT4BpWrDwqy--Oep0raYA18",
  authDomain: "romero-env.firebaseapp.com",
  projectId: "romero-env",
  storageBucket: "romero-env.firebasestorage.app",
  messagingSenderId: "350498956335",
  appId: "1:350498956335:web:901f91c4d7b983308252da"
};

const firebaseConfigStock = {
  apiKey: "AIzaSyCtMcTuEtRiR05bPQFWcFaXaVfL5hjy-Og",
  authDomain: "appstock-a009e.firebaseapp.com",
  projectId: "appstock-a009e",
  storageBucket: "appstock-a009e.firebasestorage.app",
  messagingSenderId: "908675947079",
  appId: "1:908675947079:web:672cc8896eb3ccd015ef62"
};

const appEnvase = firebase.initializeApp(firebaseConfigEnvase, "envase");
const appStock  = firebase.initializeApp(firebaseConfigStock, "stock");
const dbEnvase  = firebase.firestore(appEnvase);
const dbStock   = firebase.firestore(appStock);
const auth      = firebase.auth(appStock);

let currentUser = null;
let productos   = [];
let stockData   = {};
let todosMovimientos = [];

// ---- AUTH GUARD ----
auth.onAuthStateChanged(async (user) => {
  if (!user) { window.location.href = 'index.html'; return; }
  const doc = await dbStock.collection('usuarios').doc(user.uid).get();
  if (!doc.exists || doc.data().rol !== 'admin') {
    await auth.signOut(); window.location.href = 'index.html'; return;
  }
  currentUser = { uid: user.uid, ...doc.data() };
  document.getElementById('user-name').textContent = currentUser.nombre;
  await cargarProductos();
  iniciarListeners();
});

// ---- TABS ----
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ---- LOGOUT ----
document.getElementById('btn-logout').addEventListener('click', async () => {
  await auth.signOut(); window.location.href = 'index.html';
});

// ---- CARGAR PRODUCTOS (romero-env) ----
async function cargarProductos() {
  try {
    const snap = await dbEnvase.collection(COLECCION_PRODUCTOS).orderBy(CAMPO_NOMBRE).get();
    productos = snap.docs.map(doc => ({
      id:     doc.id,
      nombre: doc.data()[CAMPO_NOMBRE] || '(sin nombre)',
      codigo: doc.data()[CAMPO_CODIGO] || '',
      unidad: doc.data()[CAMPO_UNIDAD] || ''
    }));
    poblarSelects();
    await cargarStock();
  } catch (e) {
    document.getElementById('stock-loading').textContent =
      '⚠️ Error al cargar productos. Verificá el nombre de la colección (' + COLECCION_PRODUCTOS + ') en Firestore.';
    console.error(e);
  }
}

function poblarSelects() {
  ['mov-producto', 'hist-filtro-producto'].forEach(id => {
    const sel = document.getElementById(id);
    const firstOpt = sel.options[0];
    sel.innerHTML = '';
    sel.appendChild(firstOpt);
    productos.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = (p.codigo ? p.codigo + ' — ' : '') + p.nombre;
      sel.appendChild(opt);
    });
  });
}

// ---- CARGAR STOCK (appstock-a009e) ----
async function cargarStock() {
  const snap = await dbStock.collection('stock').get();
  stockData = {};
  snap.docs.forEach(doc => { stockData[doc.id] = doc.data(); });
  renderStockTable();
}

function renderStockTable() {
  const tbody = document.getElementById('stock-tbody');
  tbody.innerHTML = '';
  productos.forEach(p => {
    const s = stockData[p.id] || {};
    const qty = s.cantidad ?? 0;
    const fecha = s.ultimaActualizacion ? formatFecha(s.ultimaActualizacion.toDate()) : '—';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${p.codigo || '—'}</td>
      <td><strong>${p.nombre}</strong></td>
      <td>${p.unidad || '—'}</td>
      <td><span class="stock-qty ${qty <= 0 ? 'stock-low' : 'stock-ok'}">${qty}</span></td>
      <td style="font-size:0.8rem;color:#888">${fecha}</td>
      <td>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="number" class="qty-input" id="adj-${p.id}" value="${qty}" min="0" />
          <button class="btn btn-warning btn-sm" onclick="ajustarStock('${p.id}')">Ajustar</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('stock-loading').classList.add('hidden');
  document.getElementById('stock-table').classList.remove('hidden');
}

// ---- AJUSTE MANUAL (admin) ----
window.ajustarStock = async function(productoId) {
  const p = productos.find(x => x.id === productoId);
  const input = document.getElementById('adj-' + productoId);
  const cantidad = parseInt(input.value);
  if (isNaN(cantidad) || cantidad < 0) { showToast('Cantidad inválida'); return; }

  const ahora = firebase.firestore.Timestamp.fromDate(new Date());
  const batch = dbStock.batch();

  batch.set(dbStock.collection('stock').doc(productoId), {
    nombre: p.nombre, codigo: p.codigo, unidad: p.unidad,
    cantidad, ultimaActualizacion: ahora
  });
  batch.set(dbStock.collection('movimientos').doc(), {
    productoId, productoNombre: p.nombre,
    tipo: 'ajuste', cantidad, fecha: ahora,
    usuarioId: currentUser.uid, usuarioNombre: currentUser.nombre
  });
  await batch.commit();

  stockData[productoId] = { nombre: p.nombre, codigo: p.codigo, unidad: p.unidad, cantidad, ultimaActualizacion: ahora };
  renderStockTable();
  showToast(`Stock de "${p.nombre}" ajustado a ${cantidad}`);
};

// ---- REGISTRAR MOVIMIENTO ----
document.getElementById('btn-registrar').addEventListener('click', async () => {
  const productoId = document.getElementById('mov-producto').value;
  const tipo       = document.getElementById('mov-tipo').value;
  const cantidad   = parseInt(document.getElementById('mov-cantidad').value);
  const errDiv     = document.getElementById('mov-error');
  const infoDiv    = document.getElementById('mov-info');
  errDiv.classList.add('hidden'); infoDiv.classList.add('hidden');

  if (!productoId) { errDiv.textContent = 'Seleccioná un producto.'; errDiv.classList.remove('hidden'); return; }
  if (!cantidad || cantidad <= 0) { errDiv.textContent = 'Ingresá una cantidad válida.'; errDiv.classList.remove('hidden'); return; }

  const p = productos.find(x => x.id === productoId);
  const stockActual = stockData[productoId]?.cantidad ?? 0;

  if (tipo === 'salida' && cantidad > stockActual) {
    errDiv.textContent = `Stock insuficiente. Stock actual: ${stockActual} ${p.unidad}`;
    errDiv.classList.remove('hidden'); return;
  }

  const nuevoStock = tipo === 'entrada' ? stockActual + cantidad : stockActual - cantidad;
  const ahora = firebase.firestore.Timestamp.fromDate(new Date());
  const batch = dbStock.batch();

  batch.set(dbStock.collection('stock').doc(productoId), {
    nombre: p.nombre, codigo: p.codigo, unidad: p.unidad,
    cantidad: nuevoStock, ultimaActualizacion: ahora
  });
  batch.set(dbStock.collection('movimientos').doc(), {
    productoId, productoNombre: p.nombre,
    tipo, cantidad, fecha: ahora,
    usuarioId: currentUser.uid, usuarioNombre: currentUser.nombre
  });
  await batch.commit();

  stockData[productoId] = { nombre: p.nombre, codigo: p.codigo, unidad: p.unidad, cantidad: nuevoStock, ultimaActualizacion: ahora };
  renderStockTable();
  document.getElementById('mov-cantidad').value = '';
  showToast(`${tipo === 'entrada' ? 'Entrada' : 'Salida'} registrada`);
  infoDiv.textContent = `Nuevo stock de "${p.nombre}": ${nuevoStock} ${p.unidad}`;
  infoDiv.classList.remove('hidden');
});

// ---- HISTORIAL (listener tiempo real) ----
function iniciarListeners() {
  dbStock.collection('movimientos').orderBy('fecha', 'desc').limit(300)
    .onSnapshot(snap => {
      todosMovimientos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderHistorial();
    });

  dbStock.collection('usuarios')
    .onSnapshot(snap => renderUsuarios(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
}

function renderHistorial() {
  const filtroProd = document.getElementById('hist-filtro-producto').value;
  const filtroTipo = document.getElementById('hist-filtro-tipo').value;
  const filtrados  = todosMovimientos.filter(m => {
    if (filtroProd && m.productoId !== filtroProd) return false;
    if (filtroTipo && m.tipo !== filtroTipo) return false;
    return true;
  });

  const tbody = document.getElementById('hist-tbody');
  tbody.innerHTML = '';
  if (!filtrados.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Sin movimientos</td></tr>'; return;
  }
  filtrados.forEach(m => {
    const tr = document.createElement('tr');
    const label = m.tipo === 'entrada' ? '↑ Entrada' : m.tipo === 'salida' ? '↓ Salida' : '⚙ Ajuste';
    tr.innerHTML = `
      <td style="font-size:0.82rem">${m.fecha ? formatFecha(m.fecha.toDate()) : '—'}</td>
      <td>${m.productoNombre}</td>
      <td><span class="badge badge-${m.tipo}">${label}</span></td>
      <td>${m.cantidad}</td>
      <td style="font-size:0.82rem;color:#888">${m.usuarioNombre || '—'}</td>
    `;
    tbody.appendChild(tr);
  });
}

document.getElementById('hist-filtro-producto').addEventListener('change', renderHistorial);
document.getElementById('hist-filtro-tipo').addEventListener('change', renderHistorial);

// ---- USUARIOS ----
function renderUsuarios(usuarios) {
  const tbody = document.getElementById('usr-tbody');
  tbody.innerHTML = '';
  if (!usuarios.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="4">Sin usuarios</td></tr>'; return;
  }
  usuarios.forEach(u => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${u.nombre}</td>
      <td style="font-size:0.85rem">${u.email}</td>
      <td><span class="badge badge-${u.rol}">${u.rol}</span></td>
      <td>
        <button class="btn btn-grey btn-sm" onclick="cambiarRol('${u.id}','${u.rol === 'admin' ? 'operador' : 'admin'}')">
          → ${u.rol === 'admin' ? 'operador' : 'admin'}
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

window.cambiarRol = async function(uid, nuevoRol) {
  await dbStock.collection('usuarios').doc(uid).update({ rol: nuevoRol });
  showToast('Rol actualizado');
};

document.getElementById('btn-crear-usuario').addEventListener('click', async () => {
  const nombre   = document.getElementById('usr-nombre').value.trim();
  const email    = document.getElementById('usr-email').value.trim();
  const password = document.getElementById('usr-password').value;
  const rol      = document.getElementById('usr-rol').value;
  const errDiv   = document.getElementById('usr-error');
  errDiv.classList.add('hidden');

  if (!nombre || !email || !password) {
    errDiv.textContent = 'Completá todos los campos.'; errDiv.classList.remove('hidden'); return;
  }

  try {
    // App temporal para no cerrar sesión del admin actual
    const tempName = 'temp_' + Date.now();
    const appTemp  = firebase.initializeApp(firebaseConfigStock, tempName);
    const authTemp = firebase.auth(appTemp);
    const cred     = await authTemp.createUserWithEmailAndPassword(email, password);
    await dbStock.collection('usuarios').doc(cred.user.uid).set({ nombre, email, rol });
    await authTemp.signOut();
    await appTemp.delete();

    ['usr-nombre','usr-email','usr-password'].forEach(id => document.getElementById(id).value = '');
    showToast(`Usuario "${nombre}" creado`);
  } catch (e) {
    errDiv.textContent = e.message; errDiv.classList.remove('hidden');
  }
});

// ---- UTILS ----
function formatFecha(date) {
  return date.toLocaleDateString('es-AR', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
