<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Romero - Operador</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h1>📦 Stock Romero</h1>
  <div class="navbar-right">
    <span id="user-name"></span>
    <button class="btn-logout" id="btn-logout">Salir</button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="stock">Stock actual</button>
  <button class="tab-btn" data-tab="movimiento">Registrar movimiento</button>
</div>

<div class="content">

  <!-- STOCK ACTUAL (solo lectura) -->
  <div class="tab-panel active" id="tab-stock">
    <div class="card">
      <h2>Stock actual</h2>
      <div id="stock-loading" class="loading">Cargando productos...</div>
      <table id="stock-table" class="hidden">
        <thead>
          <tr>
            <th>Código</th>
            <th>Producto</th>
            <th>Unidad</th>
            <th>Stock</th>
          </tr>
        </thead>
        <tbody id="stock-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- REGISTRAR MOVIMIENTO -->
  <div class="tab-panel" id="tab-movimiento">
    <div class="card">
      <h2>Registrar movimiento</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Producto</label>
          <select id="mov-producto">
            <option value="">Seleccioná un producto...</option>
          </select>
        </div>
        <div class="form-group" style="max-width:160px">
          <label>Tipo</label>
          <select id="mov-tipo">
            <option value="entrada">↑ Entrada</option>
            <option value="salida">↓ Salida</option>
          </select>
        </div>
        <div class="form-group" style="max-width:130px">
          <label>Cantidad</label>
          <input type="number" id="mov-cantidad" min="1" placeholder="0" />
        </div>
        <div class="form-group" style="flex:0;justify-content:flex-end">
          <button class="btn btn-primary" id="btn-registrar">Registrar</button>
        </div>
      </div>
      <div id="mov-error" class="error-msg hidden"></div>
      <div id="mov-info" class="info-msg hidden"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
// ============================================================
// ⚠️ AJUSTAR: nombre de colección y campos en romero-env
const COLECCION_PRODUCTOS = 'productos';
const CAMPO_NOMBRE  = 'nombre';
const CAMPO_CODIGO  = 'codigo';
const CAMPO_UNIDAD  = 'unidad';
// ============================================================

const firebaseConfigEnvase = {
  apiKey: "AIzaSyAJgnFCKt_8TT4BpWrDwqy--Oep0raYA18",
  authDomain: "romero-env.firebaseapp.com",
  projectId: "romero-env",
  storageBucket: "romero-env.firebasestorage.app",
  messagingSenderId: "350498956335",
  appId: "1:350498956335:web:901f91c4d7b983308252da"
};

const firebaseConfigStock = {
  apiKey: "AIzaSyCtMcTuEtRiR05bPQFWcFaXaVfL5hjy-Og",
  authDomain: "appstock-a009e.firebaseapp.com",
  projectId: "appstock-a009e",
  storageBucket: "appstock-a009e.firebasestorage.app",
  messagingSenderId: "908675947079",
  appId: "1:908675947079:web:672cc8896eb3ccd015ef62"
};

const appEnvase = firebase.initializeApp(firebaseConfigEnvase, "envase");
const appStock  = firebase.initializeApp(firebaseConfigStock, "stock");
const dbEnvase  = firebase.firestore(appEnvase);
const dbStock   = firebase.firestore(appStock);
const auth      = firebase.auth(appStock);

let currentUser = null;
let productos   = [];
let stockData   = {};

// ---- AUTH GUARD ----
auth.onAuthStateChanged(async (user) => {
  if (!user) { window.location.href = 'index.html'; return; }
  const doc = await dbStock.collection('usuarios').doc(user.uid).get();
  if (!doc.exists) { await auth.signOut(); window.location.href = 'index.html'; return; }
  // Admin que entra acá → redirigir a admin.html
  if (doc.data().rol === 'admin') { window.location.href = 'admin.html'; return; }
  currentUser = { uid: user.uid, ...doc.data() };
  document.getElementById('user-name').textContent = currentUser.nombre;
  await cargarProductos();
});

// ---- TABS ----
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ---- LOGOUT ----
document.getElementById('btn-logout').addEventListener('click', async () => {
  await auth.signOut(); window.location.href = 'index.html';
});

// ---- CARGAR PRODUCTOS ----
async function cargarProductos() {
  try {
    const snap = await dbEnvase.collection(COLECCION_PRODUCTOS).orderBy(CAMPO_NOMBRE).get();
    productos = snap.docs.map(doc => ({
      id:     doc.id,
      nombre: doc.data()[CAMPO_NOMBRE] || '(sin nombre)',
      codigo: doc.data()[CAMPO_CODIGO] || '',
      unidad: doc.data()[CAMPO_UNIDAD] || ''
    }));

    const sel = document.getElementById('mov-producto');
    productos.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = (p.codigo ? p.codigo + ' — ' : '') + p.nombre;
      sel.appendChild(opt);
    });

    await cargarStock();
  } catch (e) {
    document.getElementById('stock-loading').textContent =
      '⚠️ Error al cargar productos. Verificá la colección en Firestore.';
    console.error(e);
  }
}

// ---- CARGAR STOCK ----
async function cargarStock() {
  const snap = await dbStock.collection('stock').get();
  stockData = {};
  snap.docs.forEach(doc => { stockData[doc.id] = doc.data(); });
  renderStockTable();
}

function renderStockTable() {
  const tbody = document.getElementById('stock-tbody');
  tbody.innerHTML = '';
  productos.forEach(p => {
    const qty = stockData[p.id]?.cantidad ?? 0;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${p.codigo || '—'}</td>
      <td><strong>${p.nombre}</strong></td>
      <td>${p.unidad || '—'}</td>
      <td><span class="stock-qty ${qty <= 0 ? 'stock-low' : 'stock-ok'}">${qty}</span></td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('stock-loading').classList.add('hidden');
  document.getElementById('stock-table').classList.remove('hidden');
}

// ---- REGISTRAR MOVIMIENTO ----
document.getElementById('btn-registrar').addEventListener('click', async () => {
  const productoId = document.getElementById('mov-producto').value;
  const tipo       = document.getElementById('mov-tipo').value;
  const cantidad   = parseInt(document.getElementById('mov-cantidad').value);
  const errDiv     = document.getElementById('mov-error');
  const infoDiv    = document.getElementById('mov-info');
  errDiv.classList.add('hidden'); infoDiv.classList.add('hidden');

  if (!productoId) { errDiv.textContent = 'Seleccioná un producto.'; errDiv.classList.remove('hidden'); return; }
  if (!cantidad || cantidad <= 0) { errDiv.textContent = 'Ingresá una cantidad válida.'; errDiv.classList.remove('hidden'); return; }

  const p = productos.find(x => x.id === productoId);
  const stockActual = stockData[productoId]?.cantidad ?? 0;

  if (tipo === 'salida' && cantidad > stockActual) {
    errDiv.textContent = `Stock insuficiente. Stock actual: ${stockActual} ${p.unidad}`;
    errDiv.classList.remove('hidden'); return;
  }

  const nuevoStock = tipo === 'entrada' ? stockActual + cantidad : stockActual - cantidad;
  const ahora = firebase.firestore.Timestamp.fromDate(new Date());
  const batch = dbStock.batch();

  batch.set(dbStock.collection('stock').doc(productoId), {
    nombre: p.nombre, codigo: p.codigo, unidad: p.unidad,
    cantidad: nuevoStock, ultimaActualizacion: ahora
  });
  batch.set(dbStock.collection('movimientos').doc(), {
    productoId, productoNombre: p.nombre,
    tipo, cantidad, fecha: ahora,
    usuarioId: currentUser.uid, usuarioNombre: currentUser.nombre
  });
  await batch.commit();

  stockData[productoId] = { nombre: p.nombre, codigo: p.codigo, unidad: p.unidad, cantidad: nuevoStock, ultimaActualizacion: ahora };
  renderStockTable();
  document.getElementById('mov-cantidad').value = '';
  showToast(`${tipo === 'entrada' ? 'Entrada' : 'Salida'} registrada`);
  infoDiv.textContent = `Nuevo stock de "${p.nombre}": ${nuevoStock} ${p.unidad}`;
  infoDiv.classList.remove('hidden');
});

// ---- UTILS ----
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
