<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Romero · Operador</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <div class="dot">📦</div>
    <h1>Stock Romero</h1>
  </div>
  <div class="navbar-right">
    <div class="user-pill">
      <div class="user-avatar" id="user-avatar">–</div>
      <div>
        <div class="user-name" id="user-name"></div>
        <div class="user-role">Operador</div>
      </div>
    </div>
    <button class="btn-logout" id="btn-logout">Salir</button>
  </div>
</nav>

<div class="tabs">
  <button class="tab-btn active" data-tab="stock">📋 Stock actual</button>
  <button class="tab-btn" data-tab="movimiento">↕ Movimiento</button>
</div>

<div class="content">

  <!-- STOCK ACTUAL -->
  <div class="tab-panel active" id="tab-stock">
    <div class="card">
      <div class="card-header"><h2>Stock actual</h2></div>
      <div id="stock-loading" class="empty-state">
        <div class="empty-icon">⏳</div><p>Cargando productos...</p>
      </div>
      <div class="table-wrap">
        <table id="stock-table" class="hidden">
          <thead>
            <tr>
              <th>Producto</th>
              <th>Unidad</th>
              <th>Stock</th>
            </tr>
          </thead>
          <tbody id="stock-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- MOVIMIENTO -->
  <div class="tab-panel" id="tab-movimiento">
    <div class="card">
      <div class="card-header"><h2>Registrar movimiento</h2></div>
      <div class="form-row">
        <div class="form-group" style="min-width:220px">
          <label>Producto</label>
          <select id="mov-producto"><option value="">Seleccioná un producto...</option></select>
        </div>
        <div class="form-group" style="max-width:170px">
          <label>Tipo</label>
          <select id="mov-tipo">
            <option value="entrada">↑ Entrada</option>
            <option value="salida">↓ Salida</option>
          </select>
        </div>
        <div class="form-group" style="max-width:130px">
          <label>Cantidad</label>
          <input type="number" id="mov-cantidad" min="1" placeholder="0" />
        </div>
        <div class="form-group" style="flex:0;min-width:auto">
          <label style="opacity:0">_</label>
          <button class="btn btn-primary" id="btn-registrar">Registrar</button>
        </div>
      </div>
      <div id="mov-stock-actual" class="alert alert-info hidden"></div>
      <div id="mov-error"        class="alert alert-error hidden"></div>
      <div id="mov-ok"           class="alert alert-ok hidden"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="config.js"></script>
<script src="operador.js"></script>
</body>
</html>
