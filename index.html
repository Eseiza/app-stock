<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Stock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar">
        <h2>APP STOCK</h2>
        <ul>
            <li>Dashboard</li>
            <li>Stock</li>
            <li>Entradas</li>
            <li>Salidas</li>
            <li>Movimientos</li>
        </ul>
    </aside>
    <main class="content">
        <header>
            <h1>Panel de Control</h1>
        </header>
        <section class="cards">
            <div class="card">
                <h3>Productos</h3>
                <span id="productos">128</span>
            </div>
            <div class="card">
                <h3>Stock Total</h3>
                <span id="stock">3560</span>
            </div>
            <div class="card">
                <h3>Movimientos Hoy</h3>
                <span id="movimientos">24</span>
            </div>
        </section>
        <section class="tabla">
            <h2>Stock Actual</h2>
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Código</th>
                        <th>Stock</th>
                    </tr>
                </thead>
                <tbody id="tablaStock">
                </tbody>
            </table>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
