<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Romero</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon">📦</div>
      <h1>Stock Romero</h1>
      <p>Gestión de stock · Panificados</p>
    </div>
    <div id="error-msg" class="alert alert-error hidden"></div>
    <div class="field">
      <input type="email" id="email" placeholder="Email" autocomplete="email" />
    </div>
    <div class="field">
      <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" />
    </div>
    <button class="btn-login" id="btn-login">Ingresar</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="config.js"></script>
<script src="login.js"></script>
</body>
</html>
